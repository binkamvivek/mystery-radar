<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mystery Radar</title>

    <link rel="stylesheet" href="style.css">

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet/dist/leaflet.css"
    />
</head>

<body>

<div class="container">

    <h1>MYSTERY RADAR</h1>

    <p class="subtitle">
        Discover places by unlocking them.
    </p>

    <input
        id="themeInput"
        placeholder="Hidden cafes and street art..."
    >

    <button onclick="generateMission()">
        Generate Mission
    </button>

    <div id="loading"></div>

    <div id="missionBox"></div>

    <div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>

</html>
