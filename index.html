<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto-Vault Geofence</title>
    <style>
        :root {
            --lock-color: #ef4444;
            --unlock-color: #10b981;
        }
        body {
            background-color: #030712;
            color: #f3f4f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .vault-container {
            background-color: #1f2937;
            width: 360px;
            height: 640px;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            border: 1px solid #374151;
            transition: border-color 0.5s ease;
        }
        .status-header {
            text-align: center;
        }
        .security-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 1px;
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--lock-color);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .display-panel {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        /* Lock Animation Container */
        .lock-core {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--lock-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            margin-bottom: 20px;
            transition: all 0.5s ease;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.2);
        }
        /* Hidden Vault Panel - Hidden by default */
        #decrypted-payload {
            display: none;
            width: 100%;
            background: #111827;
            border-radius: 12px;
            padding: 15px;
            border-left: 4px solid var(--unlock-color);
            box-sizing: border-box;
            text-align: left;
        }
        .data-item {
            margin: 10px 0;
            font-family: monospace;
            font-size: 0.9rem;
        }
        .btn-auth {
            background-color: #374151;
            color: #ffffff;
            border: 1px solid #4b5563;
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-auth:hover {
            background-color: #4b5563;
        }
    </style>
</head>
<body>

    <div id="vault-card" class="vault-container">
        <div class="status-header">
            <div id="badge" class="security-badge">VAULT LOCKED</div>
            <h2 style="margin-top: 10px; font-size: 1.2rem;">LOCATION-BOUND STORAGE</h2>
        </div>
        
        <div class="display-panel">
            <div id="lock-icon" class="lock-core">🔒</div>
            <p id="distance-tracker" style="font-size: 0.9rem; color: #9ca3af; text-align: center; margin: 0 0 20px 0;">
                Awaiting perimeter metrics...
            </p>

            <div id="decrypted-payload">
                <h4 style="margin: 0 0 10px 0; color: var(--unlock-color);">DECRYPTED SECURE KEYS:</h4>
                <div class="data-item">🔑 Root_Token: <span style="color: #fff;">usr_x9928_mlr</span></div>
                <div class="data-item">🌐 Secure_IP: <span style="color: #fff;">192.168.42.105</span></div>
                <div class="data-item">💾 Server_Pass: <span style="color: #fff;">df77#@kL90!m</span></div>
            </div>
        </div>

        <div>
            <button class="btn-auth" onclick="initializeVaultLink()">INITIALIZE HARDWARE SCAN</button>
        </div>
    </div>

    <script>
        // Set your target safe zone coordinates (Currently set to your campus block)
        const SAFE_ZONE_LAT = 17.5458; 
        const SAFE_ZONE_LON = 78.4078; 
        const UNLOCK_RADIUS_METERS = 20; // 20-meter tight security perimeter

        const vaultCard = document.getElementById('vault-card');
        const badge = document.getElementById('badge');
        const lockIcon = document.getElementById('lock-icon');
        const distanceTracker = document.getElementById('distance-tracker');
        const payload = document.getElementById('decrypted-payload');

        function haversineDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function initializeVaultLink() {
            if (!navigator.geolocation) {
                distanceTracker.innerText = "Hardware execution error: GPS missing.";
                return;
            }

            distanceTracker.innerText = "Querying satellite array coordinates...";

            navigator.geolocation.watchPosition(
                (position) => {
                    const currentLat = position.coords.latitude;
                    const currentLon = position.coords.longitude;
                    const accuracy = position.coords.accuracy;

                    const distance = haversineDistance(currentLat, currentLon, SAFE_ZONE_LAT, SAFE_ZONE_LON);

                    // Update metrics text
                    distanceTracker.innerHTML = `Perimeter Distance: ${Math.round(distance)}m<br><span style="font-size: 0.75rem; color:#6b7280;">GPS Accuracy: ±${Math.round(accuracy)}m</span>`;

                    // EVALUATE GEOFENCE SECURITY CRITERIA
                    if (distance <= UNLOCK_RADIUS_METERS) {
                        // Enter UNLOCKED State
                        vaultCard.style.borderColor = "var(--unlock-color)";
                        badge.innerText = "ACCESS GRANTED";
                        badge.style.backgroundColor = "rgba(16, 185, 129, 0.1)";
                        badge.style.color = "var(--unlock-color)";
                        badge.style.borderColor = "rgba(16, 185, 129, 0.2)";
                        lockIcon.innerText = "🔓";
                        lockIcon.style.borderColor = "var(--unlock-color)";
                        lockIcon.style.boxShadow = "0 0 15px rgba(16, 185, 129, 0.2)";
                        payload.style.display = "block"; // Show the hidden files
                    } else {
                        // Enforce LOCKED State
                        vaultCard.style.borderColor = "#374151";
                        badge.innerText = "ACCESS DENIED - OUT OF BOUNDS";
                        badge.style.backgroundColor = "rgba(239, 68, 68, 0.1)";
                        badge.style.color = "var(--lock-color)";
                        badge.style.borderColor = "rgba(239, 68, 68, 0.2)";
                        lockIcon.innerText = "🔒";
                        lockIcon.style.borderColor = "var(--lock-color)";
                        lockIcon.style.boxShadow = "0 0 15px rgba(239, 68, 68, 0.2)";
                        payload.style.display = "none"; // Hide the payload completely
                    }
                },
                (error) => {
                    distanceTracker.innerText = "Security Halt: Hardware perimeter check rejected.";
                },
                {
                    enableHighAccuracy: true,
                    maximumAge: 0,
                    timeout: 10000
                }
            );
        }
    </script>
</body>
</html>
